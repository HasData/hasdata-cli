name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      # Homebrew / Scoop / Winget publishing requires a GitHub App token with
      # write access to the tap/bucket repos. Re-add the following step once
      # those repos and App exist (see .goreleaser.yaml for the setup
      # instructions), and uncomment the matching *_TOKEN env vars below.
      #
      # - name: generate github app token
      #   id: app_token
      #   uses: actions/create-github-app-token@v1
      #   with:
      #     app-id: ${{ secrets.RELEASE_APP_ID }}
      #     private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      #     owner: hasdata-com

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN: ${{ steps.app_token.outputs.token }}
          # SCOOP_BUCKET_TOKEN: ${{ steps.app_token.outputs.token }}
          # WINGET_PKGS_TOKEN: ${{ steps.app_token.outputs.token }}
